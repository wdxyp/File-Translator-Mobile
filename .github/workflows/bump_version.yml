name: Bump version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Bump version.json
        run: |
          python - <<'PY'
          import json, re
          from pathlib import Path
          
          path = Path("version.json")
          data = {"version": "2.0.0"}
          if path.exists():
            try:
              data = json.loads(path.read_text(encoding="utf-8"))
            except:
              pass
          
          v = str(data.get("version", "2.0.0")).strip().lstrip("vV")
          # 支持 x.y.z 或 x.y 格式
          parts = v.split(".")
          if len(parts) == 1:
            major, minor, patch = int(parts[0]), 0, 1
          elif len(parts) == 2:
            major, minor, patch = int(parts[0]), int(parts[1]), 1
          else:
            major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2]) + 1
          
          new_v = f"{major}.{minor}.{patch}"
          data["version"] = new_v
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"New version: {new_v}")
          PY

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ver=$(python - <<'PY'
          import json
          print(json.load(open("version.json", encoding="utf-8"))["version"])
          PY
          )
          git add version.json
          git commit -m "chore: bump version to v$ver [skip ci]"
          git push
